services:

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: login_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword123
    ports:
      - "5432:5432"


  flask_app:
    build: .
    container_name: flask_application
    ports:
      - "5001:5000"

    depends_on:
      - db